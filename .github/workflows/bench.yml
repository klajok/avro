on:
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/bench.yml"
  workflow_dispatch:

name: bench

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GO_VERSION: "1.26"
      BENCH_COUNT: "6"
      BENCH_TIME: "200ms"
      BENCH_PATTERN: "."
      BENCH_PACKAGES: "./..."

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install Go
        id: install-go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download
        if: steps.install-go.outputs.cache-hit != 'true'

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Resolve base and head SHAs
        id: shas
        uses: actions/github-script@v7
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        with:
          script: |
            const head = process.env.PR_HEAD_SHA || context.sha;
            const base = process.env.PR_BASE_REF || 'main';
            const { owner, repo } = context.repo;
            const { data } = await github.rest.repos.compareCommits({
              owner, repo, base, head,
            });
            const mergeBase = data.merge_base_commit.sha;
            core.setOutput('head', head);
            core.setOutput('base', mergeBase);
            core.info(`Base (merge-base): ${mergeBase}`);
            core.info(`Head: ${head}`);

      - name: Fetch base and head commits
        env:
          BASE_SHA: ${{ steps.shas.outputs.base }}
          HEAD_SHA: ${{ steps.shas.outputs.head }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "$BASE_SHA" "$HEAD_SHA"

      - name: Benchmark base
        env:
          BASE_SHA: ${{ steps.shas.outputs.base }}
        run: |
          set -euo pipefail
          git checkout --detach "$BASE_SHA"
          go test -run='^$' -bench="$BENCH_PATTERN" -benchmem \
            -count="$BENCH_COUNT" -benchtime="$BENCH_TIME" \
            $BENCH_PACKAGES | tee base.txt

      - name: Benchmark head
        env:
          HEAD_SHA: ${{ steps.shas.outputs.head }}
        run: |
          set -euo pipefail
          git checkout --detach "$HEAD_SHA"
          go test -run='^$' -bench="$BENCH_PATTERN" -benchmem \
            -count="$BENCH_COUNT" -benchtime="$BENCH_TIME" \
            $BENCH_PACKAGES | tee head.txt

      - name: Compare with benchstat
        run: benchstat base.txt head.txt | tee result.txt

      - name: Build comment body
        uses: actions/github-script@v7
        env:
          BASE_SHA: ${{ steps.shas.outputs.base }}
          HEAD_SHA: ${{ steps.shas.outputs.head }}
          BENCH_COUNT: ${{ env.BENCH_COUNT }}
          BENCH_TIME: ${{ env.BENCH_TIME }}
          RESULT_FILE: result.txt
          OUTPUT_FILE: comment.md
        with:
          script: |
            const fs = require('fs');
            const { BASE_SHA, HEAD_SHA, BENCH_COUNT, BENCH_TIME, RESULT_FILE, OUTPUT_FILE } = process.env;

            let result = '';
            try {
              result = fs.readFileSync(RESULT_FILE, 'utf8').trim();
            } catch (e) {
              core.warning(`Could not read ${RESULT_FILE}: ${e.message}`);
            }

            const baseShort = BASE_SHA.slice(0, 7);
            const headShort = HEAD_SHA.slice(0, 7);

            const body = result
              ? [
                  '## Benchmark report',
                  '',
                  `\`${baseShort}\` (base, merge-base) vs \`${headShort}\` (head)`,
                  `Configuration: \`-count=${BENCH_COUNT} -benchtime=${BENCH_TIME}\` on \`ubuntu-latest\``,
                  '',
                  '<details open>',
                  '<summary><code>benchstat</code> output</summary>',
                  '',
                  '```',
                  result,
                  '```',
                  '',
                  '</details>',
                  '',
                  '> Numbers from `ubuntu-latest` are noisy (typical ±5–15%). Treat this report',
                  "> as advisory: a flagged regression isn't always real, and an unflagged change",
                  "> isn't always safe. Re-run the workflow to confirm a suspicious result, and",
                  '> profile locally on a quiet machine before acting.',
                ].join('\n')
              : [
                  '## Benchmark report',
                  '',
                  `\`${baseShort}\` (base) vs \`${headShort}\` (head).`,
                  '',
                  'No benchmark output to compare.',
                ].join('\n');

            fs.writeFileSync(OUTPUT_FILE, body);
            core.info(`Wrote comment body to ${OUTPUT_FILE}`);

      - name: Post sticky comment
        if: github.event_name == 'pull_request'
        # Forks can't write to the PR; skip rather than fail the run.
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: bench-report
          path: comment.md

      - name: Upload raw bench output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: |
            base.txt
            head.txt
            result.txt
            comment.md
