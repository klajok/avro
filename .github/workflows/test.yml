on:
  push:
    branches:
      - main
  pull_request:

name: run tests
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.24", "1.25", "1.26"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Go
        id: install-go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download
        if: steps.install-go.outputs.cache-hit != 'true'

      - name: Run linter
        run: go tool golangci-lint run ./...

      - name: Check formatting
        run: go tool golangci-lint fmt --diff

      - name: Run Tests
        run: go tool gotestsum --junitfile tests.xml --format pkgname -- -covermode=atomic -coverprofile=coverage.out -race ./...

      - name: Test Summary
        uses: test-summary/action@v2
        with:
          paths: "tests.xml"
        if: always()

      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          files: coverage.out
          format: golang
          parallel: true
          flag-name: go-${{ matrix.go-version }}

  finish:
    needs: test
    if: ${{ always() }}
    runs-on: ubuntu-latest

    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true

  test-386:
    runs-on: ubuntu-latest
    env:
      GO_VERSION: "1.26"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Go
        id: install-go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download
        if: steps.install-go.outputs.cache-hit != 'true'

      # Runs the suite under GOARCH=386 to catch int64 → int truncation
      # bugs on 32-bit platforms. -race requires 64-bit so it is omitted.
      - name: Run Tests (GOARCH=386)
        env:
          GOARCH: "386"
          CGO_ENABLED: "0"
        run: go test -count=1 ./...

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os:
          - darwin
          - linux
          - windows
        arch:
          - 386
          - amd64
          - arm
          - arm64
          - ppc64le
          - s390x
        include:
          - os: linux
            arch: arm
            arm: 7
        exclude:
          - os: darwin
            arch: 386
          - os: darwin
            arch: arm
          - os: darwin
            arch: ppc64le
          - os: darwin
            arch: s390x
          - os: windows
            arch: arm
          - os: windows
            arch: arm64
          - os: windows
            arch: ppc64le
          - os: windows
            arch: s390x
    env:
      GO_VERSION: "1.26"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Go
        id: install-go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download
        if: steps.install-go.outputs.cache-hit != 'true'

      - name: Build avrogen
        run: GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} GOARM=${{ matrix.arm }} go build ./cmd/avrogen

      - name: Build avrosv
        run: GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} GOARM=${{ matrix.arm }} go build ./cmd/avrosv
